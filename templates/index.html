<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Erros Digibee</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { border-left: 5px solid #007bff; padding-left: 15px; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #007bff; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f1f1f1; }
        .btn { background: #007bff; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 5px; max-width: 600px; width: 90%; }
        .close { float: right; cursor: pointer; font-size: 20px; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Monitor de Erros Digibee</h2>
    <table>
        <thead>
            <tr>
                <th>Pipeline</th>
                <th>Diagnóstico</th>
                <th>Timestamp</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="corpo-tabela">
            <tr><td colspan="4" style="text-align:center;">Carregando dados...</td></tr>
        </tbody>
    </table>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h3>Detalhes do Erro</h3>
        <pre id="modalBody"></pre>
    </div>
</div>

<script>
    function carregarErros() {
        fetch('/listar-erros')
            .then(res => res.json())
            .then(data => {
                const corpoTabela = document.getElementById('corpo-tabela');
                if (data.length === 0) {
                    corpoTabela.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Nenhum erro encontrado.</td></tr>";
                    return;
                }
                corpoTabela.innerHTML = "";
                data.forEach((e, index) => {
                    corpoTabela.innerHTML += `<tr>
                        <td><b>${e.pipeline_name || 'N/A'}</b></td>
                        <td>${e.erro_mensagem || 'Sem detalhes'}</td>
                        <td>${e.timestamp || 'N/A'}</td>
                        <td><button class="btn" onclick="verDetalhes(${index})">Ver Log</button></td>
                    </tr>`;
                });
                window.erros = data;
            })
            .catch(err => {
                document.getElementById('corpo-tabela').innerHTML = "<tr><td colspan='4' style='color:red;'>Erro ao carregar dados.</td></tr>";
            });
    }

    function verDetalhes(index) {
        const erro = window.erros[index];
        document.getElementById('modalBody').innerText = JSON.stringify(erro, null, 2);
        document.getElementById('modal').style.display = 'block';
    }

    function fecharModal() {
        document.getElementById('modal').style.display = 'none';
    }

    // Carrega os dados ao abrir a página
    carregarErros();

    // Atualiza a cada 3 segundos
    setInterval(carregarErros, 3000);
</script>

</body>
</html>
